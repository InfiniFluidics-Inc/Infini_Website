// ── Insert SOLID FILL behind everything ──
// This path uses only the outer boundary, so it's completely solid #2B3276.
// It sits behind the holed base path. Holes in the base show this solid fill = no holes visible.
const solidFill = document.createElementNS(NS, 'path');
solidFill.setAttribute('d', OUTER_D);
solidFill.setAttribute('fill', '#2B3276');
svg.insertBefore(solidFill, svg.firstChild);

// ── Find dot paths ──
const DOT_FILLS = new Set([
  '#A2A2C6','#A1A1C6','#A2A1C6','#A1A1C5','#A2A1C5',
  '#A2A2C5','#A1A2C6','#A2A3C6','#A1A0C5','#A6A5C3','#9C9DCA'
].map(c=>c.toUpperCase()));

const origDots = [];
svg.querySelectorAll('path').forEach(p => {
  const f = (p.getAttribute('fill')||'').toUpperCase();
  if (DOT_FILLS.has(f)) origDots.push(p);
});

const SPAWN_X = 248, SPAWN_Y = 110;

requestAnimationFrame(() => {
  // Measure dot positions
  const dotData = origDots.map(p => {
    const bb = p.getBBox();
    return {
      orig: p,
      cx: bb.x + bb.width/2,
      cy: bb.y + bb.height/2,
      d: p.getAttribute('d'),
      fill: p.getAttribute('fill'),
      op: p.getAttribute('opacity') || '1'
    };
  });
  dotData.sort((a,b) => a.cx - b.cx);
  const N = dotData.length;

  // ── Create clone group for animated dots ──
  const cloneGroup = document.createElementNS(NS, 'g');
  svg.appendChild(cloneGroup);

  const clones = dotData.map(d => {
    const c = document.createElementNS(NS, 'path');
    c.setAttribute('d', d.d);
    c.setAttribute('fill', d.fill);
    c.setAttribute('opacity', d.op);
    c.style.transformBox = 'fill-box';
    c.style.transformOrigin = 'center center';
    cloneGroup.appendChild(c);
    return c;
  });

  // ── Timeline ──
  // 0–4.5s:    dots stream from spawn → home
  // 5s:        all in place, swap to originals
  // 5.3s:      wordmark in
  // 5.3–8s:    hold (frozen = original logo)
  // 8–8.5s:    wordmark fades
  // 8.5–9s:    pause
  // 9s:        loop

  const STREAM_END = 4800;
  const SWAP       = 5000;
  const WORD_IN    = 5300;
  const HOLD_END   = 8000;
  const CYCLE      = 9000;

  const wmEl = document.getElementById('wordmark');

  function runCycle() {
    // ── Reset: hide originals, show clones at spawn ──
    origDots.forEach(p => p.style.visibility = 'hidden');
    wmEl.className = 'wordmark';

    clones.forEach((c, i) => {
      const d = dotData[i];
      const dx = SPAWN_X - d.cx;
      const dy = SPAWN_Y - d.cy;
      c.style.transition = 'none';
      c.style.transform = `translate(${dx}px, ${dy}px)`;
      c.style.opacity = '0';
      c.style.visibility = 'visible';
    });

    // ── Stagger each clone's flight to home ──
    clones.forEach((c, i) => {
      const d = dotData[i];
      const dx = SPAWN_X - d.cx;
      const dy = SPAWN_Y - d.cy;
      const dist = Math.hypot(dx, dy);
      const flight = 700 + (dist / 300) * 1000;
      const delay = (i / N) * 3500;

      setTimeout(() => {
        c.style.transition = 'none';
        c.style.opacity = '1';
        void c.offsetWidth;
        c.style.transition = `transform ${flight}ms cubic-bezier(.22,.68,.35,1)`;
        c.style.transform = 'translate(0,0)';
      }, delay);
    });

    // ── Ensure all settled ──
    setTimeout(() => {
      clones.forEach(c => {
        c.style.transition = 'none';
        c.style.transform = 'translate(0,0)';
        c.style.opacity = '1';
      });
    }, STREAM_END);

    // ── Swap: show originals, hide clones (seamless, identical positions) ──
    setTimeout(() => {
      origDots.forEach(p => p.style.visibility = '');
      clones.forEach(c => c.style.visibility = 'hidden');
    }, SWAP);

    // ── Wordmark ──
    setTimeout(() => { wmEl.className = 'wordmark show'; }, WORD_IN);

    // ── Fade wordmark for reset ──
    setTimeout(() => { wmEl.style.transition = 'opacity .4s'; wmEl.style.opacity = '0'; }, HOLD_END);

    // ── Reset style for next loop ──
    setTimeout(() => { wmEl.style.transition = ''; wmEl.style.opacity = ''; }, HOLD_END + 500);

    // ── Loop ──
    setTimeout(runCycle, CYCLE);
  }

  runCycle();
});
</script>
